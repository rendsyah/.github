name: "Notify"
description: "Action to send notification"
inputs:
  channel:
    required: true
    description: "Notification channel to send the message to"
  status:
    required: true
    description: "Deployment or workflow status being reported"
  notify_url:
    required: true
    description: "API endpoint that receives the notification."
  remarks:
    required: false
    description: "Remarks to include in the notification."

runs:
  using: "composite"
  steps:
    - name: "Send Notification"
      shell: bash
      env:
        CHANNEL: ${{ inputs.channel }}
        STATUS: ${{ inputs.status }}
        REPO: ${{ github.repository }}
        REF: ${{ github.head_ref || github.ref_name }}
        ACTOR: ${{ github.actor }}
        COMMITTERS: ${{ github.event.head_commit.author.name }}
        BUILD_NUMBER: ${{ github.run_number }}
        REMARKS: ${{ inputs.remarks }}
        NOTIFY_URL: ${{ inputs.notify_url }}
        RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
      run: |
        jq -n \
          --arg channel "$CHANNEL" \
          --arg status "$STATUS" \
          --arg repo "$REPO" \
          --arg ref "$REF" \
          --arg actor "$ACTOR" \
          --arg committers "$COMMITTERS" \
          --arg build_number "$BUILD_NUMBER" \
          --arg remarks "$REMARKS" \
          --arg run_url "$RUN_URL" \
          --arg commit_url "$COMMIT_URL" \
          '{
            channel: $channel,
            status: $status,
            repo: $repo,
            ref: $ref,
            actor: $actor,
            committers: $committers,
            build_number: $build_number,
            remarks: $remarks,
            run_url: $run_url,
            commit_url: $commit_url
          }' | curl -fsS --max-time 5 -o /dev/null -X POST "$NOTIFY_URL" \
              -H "Content-Type: application/json" \
              -d @-
